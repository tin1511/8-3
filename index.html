<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thiệp 8/3</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#fae1dd;
    overflow:hidden;
}

/* màn nhập tên */

#askName{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#fae1dd;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}

input{
padding:10px;
font-size:18px;
border-radius:10px;
border:none;
}

button{
padding:10px 20px;
font-size:18px;
background:#ff6b81;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

/* thư */

.container{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

.letter{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
max-width:400px;
}

h2{
color:#ff6b81;
}

p{
font-size:18px;
}

/* tim bay */

.heart{
position:fixed;
bottom:-10px;
color:red;
font-size:20px;
animation:fly 5s linear infinite;
}

@keyframes fly{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-100vh);
opacity:0;
}
}

</style>

</head>

<body>

<div id="askName">
<h2>Nhập tên của bạn 🌸</h2>
<input id="userName" placeholder="Tên của bạn">
<br><br>
<button onclick="startSite()">Xem thiệp</button>
</div>


<div class="container" id="main" style="display:none">

<div class="letter">
<h2 id="title">Gửi cậu!</h2>

<p id="message">
Hôm nay là ngày 08/03.  
Chúc cậu luôn vui vẻ, hạnh phúc, học giỏi và ngày càng xinh đẹp.  
Mong rằng hôm nay sẽ là một ngày thật đặc biệt 🌸
</p>

</div>

</div>

<script>

let userName="cậu"

function startSite(){

let nameInput=document.getElementById("userName").value

if(nameInput.trim()!=""){
userName=nameInput
}

document.getElementById("askName").style.display="none"
document.getElementById("main").style.display="flex"

document.getElementById("title").innerText="Gửi "+userName+"!"
document.getElementById("message").innerText=
"Hôm nay là ngày 08/03. Chúc "+userName+" luôn vui vẻ, hạnh phúc, học giỏi và ngày càng xinh đẹp. Mong rằng hôm nay sẽ là một ngày thật đặc biệt với "+userName+" 🌸"

createHearts()

}

function createHearts(){

setInterval(()=>{
let heart=document.createElement("div")

heart.className="heart"
heart.innerText="❤"

heart.style.left=Math.random()*100+"vw"
heart.style.fontSize=(Math.random()*20+10)+"px"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},5000)

},300)

}

</script>

</body>
</html>
